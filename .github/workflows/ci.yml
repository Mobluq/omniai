name: CI

on:
  pull_request:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Validate application
    runs-on: ubuntu-latest
    timeout-minutes: 25

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: omniai
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d omniai"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/omniai?schema=public
      NEXTAUTH_SECRET: ci-nextauth-secret-that-is-only-used-for-validation
      NEXTAUTH_URL: http://localhost:3000
      APP_URL: http://localhost:3000
      APP_ENCRYPTION_KEY: ci-encryption-key-with-at-least-32-chars
      SIGNUP_MODE: public
      REQUIRE_EMAIL_VERIFICATION: "false"

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate Prisma schema
        run: npm run db:validate

      - name: Apply migrations
        run: npm run db:deploy

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm test

      - name: Production build
        run: npm run build

      - name: Audit production dependencies
        run: npm run security:audit
