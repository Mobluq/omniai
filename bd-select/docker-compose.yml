services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: bd-select-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: bd_select
    ports:
      - "5432:5432"
    volumes:
      - bd-select-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d bd_select"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  bd-select-postgres-data:
